name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
          pip install pyinstaller

      - name: Build Windows folder (for Setup)
        run: python -m PyInstaller pdfconverter_folder.spec --noconfirm --clean

      - name: Build Windows one-file exe
        run: python -m PyInstaller pdfconverter.spec --noconfirm --clean

      - name: Create Setup with Inno Setup
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Create portable ZIP
        run: Compress-Archive -Path "dist\PDF2LLM\*" -DestinationPath "dist\PDF2LLM-portable.zip"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            dist/PDF2LLM.exe
            dist/PDF2LLM-Setup-*.exe
            dist/PDF2LLM-portable.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential python3-tk
          sudo gem install fpm

      - name: Install Python dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
          pip install pyinstaller

      - name: Build Linux binary with PyInstaller
        run: |
          python -m PyInstaller \
            --name pdf2llm \
            --onefile \
            --windowed \
            --add-data "locales:locales" \
            --hidden-import src \
            --hidden-import src.gui.main_window \
            --hidden-import src.gui.about_dialog \
            --hidden-import src.converters.pdf_converter \
            --hidden-import src.converters.pdf_validator \
            --hidden-import src.converters.conversion_manager \
            --hidden-import src.models.data_models \
            --hidden-import src.models.file_list_manager \
            --hidden-import src.i18n.i18n_manager \
            --hidden-import src.ocr.ocr_engine \
            --hidden-import src.ocr.ocr_manager \
            --hidden-import src.ocr.tesseract_engine \
            --hidden-import src.ocr.easyocr_engine \
            --hidden-import src.ocr.markdown_quality_detector \
            --hidden-import pymupdf4llm \
            --hidden-import pymupdf.layout \
            src/main.py

      - name: Create .deb package with fpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          
          mkdir -p deb-staging/usr/bin
          mkdir -p deb-staging/usr/share/pdf2llm
          mkdir -p deb-staging/usr/share/applications
          mkdir -p deb-staging/usr/share/doc/pdf2llm
          
          cp dist/pdf2llm deb-staging/usr/bin/pdf2llm
          chmod +x deb-staging/usr/bin/pdf2llm
          
          cp README.md deb-staging/usr/share/doc/pdf2llm/
          cp LICENSE deb-staging/usr/share/doc/pdf2llm/
          
          cat > deb-staging/usr/share/applications/pdf2llm.desktop << 'EOF'
          [Desktop Entry]
          Name=PDF2LLM
          Comment=Convert PDFs to Markdown optimized for LLMs
          Exec=/usr/bin/pdf2llm
          Type=Application
          Categories=Utility;TextTools;
          Terminal=false
          EOF
          
          fpm -s dir -t deb \
            --name pdf2llm \
            --version "$VERSION" \
            --description "PDF to Markdown converter optimized for LLMs" \
            --maintainer "William Mendes <wcmendes@users.noreply.github.com>" \
            --license MIT \
            --url "https://github.com/wcmendes/pdftollm" \
            --depends "python3 >= 3.10" \
            --deb-no-default-config-files \
            -C deb-staging \
            .

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            *.deb

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: artifacts/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: |
            artifacts/windows/PDF2LLM.exe
            artifacts/windows/PDF2LLM-Setup-*.exe
            artifacts/windows/PDF2LLM-portable.zip
            artifacts/linux/*.deb
